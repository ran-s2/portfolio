<section class="contact-page wrapper">
    <div class="title contact-title">
        <h2>CONTACT</h2>
        <p>お問い合わせ</p>
    </div>

    <form action="#" method="post" class="contact-form">
        <div class="form-group">
            <label for="name">
                お名前<span class="required">必須</span>
            </label>
            <input type="text" id="name" name="name" placeholder="お名前">
        </div>

        <div class="form-group">
            <label for="mail">
                メールアドレス<span class="required">必須</span>
            </label>
            <input type="email" id="mail" name="mail" placeholder="メールアドレス">
        </div>

        <div class="form-group">
            <label for="tel">
                電話番号（任意）
            </label>
            <input type="tel" id="tel" name="tel" placeholder="電話番号（任意）">
        </div>

        <div class="form-group">
            <label for="type">
                お問い合わせ種別<span class="required">必須</span>
            </label>

            <select id="type" name="type">
                <option value="">選択してください</option>
                <option>商品について</option>
                <option>ご予約について</option>
                <option>営業時間について</option>
                <option>採用について</option>
                <option>その他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">
                お問い合わせ内容<span class="required">必須</span>
            </label>

            <textarea
                id="message"
                name="message"
                rows="8"
                placeholder="お問い合わせ内容をご入力ください">
            </textarea>
        </div>

        <button type="submit" class="contact-btn">
            送信する
        </button>
    </form>
</section>
